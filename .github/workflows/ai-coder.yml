name: AI Coder

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  ai-code:
    if: github.event.label.name == 'ai-task'
    runs-on: ubuntu-latest

    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            あなたは vscode-mindmap-editor（VS Code 拡張機能）の開発エージェントです。

            以下の Issue を実装・修正してください。

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            Issue 本文:
            ${{ github.event.issue.body }}

            ## 作業手順

            1. リポジトリのコードを読んで現状を把握する
            2. Issue の要求を実装・修正する
               - ソースコードは `src/` 以下（TypeScript）
               - WebView 用スクリプトは `media/mindmap.js`
               - エントリポイントは `src/extension.ts`
            3. `feature/issue-${{ github.event.issue.number }}` ブランチを作成して変更をコミットする
               - コミットメッセージは日本語で簡潔に（例: `feat: ○○機能を追加 (#${{ github.event.issue.number }})`）
            4. main ブランチへの draft PR を作成する
               - PR タイトル: `feat: ${{ github.event.issue.title }}`
               - PR 本文に変更内容のサマリーと `Closes #${{ github.event.issue.number }}` を含める

            ## 注意事項

            - CLAUDE.md に「feature-dev エージェントを通して行うこと」と書かれているが、この Actions 環境ではサブエージェントは使えない。**直接ファイルを編集して実装すること**
            - `dist/` は編集しない（ビルド出力のため）
            - `CLAUDE.md` は編集しない
            - コメントは WHY が非自明な場合のみ書く
            - バージョンバンプ（package.json の version）は変更しない（後工程で行う）
          claude_args: |
            --max-turns 50
