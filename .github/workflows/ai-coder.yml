name: AI Coder

on:
  schedule:
    - cron: '0 17 * * *'  # JST 2:00
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      issues: ${{ steps.list.outputs.issues }}
    steps:
      - name: List ai-task issues
        id: list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          issues=$(gh issue list --repo ${{ github.repository }} --label ai-task --state open --json number,title,body --limit 100)
          echo "issues=$(echo "$issues" | jq -c .)" >> "$GITHUB_OUTPUT"

  ai-code:
    needs: discover
    if: needs.discover.outputs.issues != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        issue: ${{ fromJson(needs.discover.outputs.issues) }}

    steps:
      - name: Resolve Jira key and naming
        id: jira
        env:
          ISSUE_BODY: ${{ matrix.issue.body }}
          ISSUE_TITLE: ${{ matrix.issue.title }}
          ISSUE_NUMBER: ${{ matrix.issue.number }}
        run: |
          set -euo pipefail
          body_file=$(mktemp)
          printf '%s' "$ISSUE_BODY" > "$body_file"

          jira_key=$(grep -oE 'Jira課題キー: `HSKZ-[0-9]+`' "$body_file" | grep -oE 'HSKZ-[0-9]+' | head -1)

          if [ -n "$jira_key" ]; then
            branch_name="feature/${jira_key}-issue-${ISSUE_NUMBER}"
            commit_example="${jira_key} feat: 変更内容 (#${ISSUE_NUMBER})"
            pr_title="${jira_key} feat: ${ISSUE_TITLE}"
          else
            branch_name="feature/issue-${ISSUE_NUMBER}"
            commit_example="feat: 変更内容 (#${ISSUE_NUMBER})"
            pr_title="feat: ${ISSUE_TITLE}"
          fi

          delim="ghoutput_${RANDOM}${RANDOM}"

          echo "jira_key=${jira_key}" >> "$GITHUB_OUTPUT"
          echo "branch_name=${branch_name}" >> "$GITHUB_OUTPUT"

          echo "commit_example<<${delim}" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$commit_example" >> "$GITHUB_OUTPUT"
          echo "${delim}" >> "$GITHUB_OUTPUT"

          echo "pr_title<<${delim}" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$pr_title" >> "$GITHUB_OUTPUT"
          echo "${delim}" >> "$GITHUB_OUTPUT"

      - name: Select model
        id: model
        run: |
          text=$(cat <<'EOF'
          ${{ matrix.issue.title }} ${{ matrix.issue.body }}
          EOF
          )
          if echo "$text" | grep -Eqi 'アーキテクチャ|設計|リファクタ|調査|複雑'; then
            echo "model=claude-opus-4-8" >> "$GITHUB_OUTPUT"
          elif echo "$text" | grep -Eqi 'typo|誤字|文言修正|バージョンのみ'; then
            echo "model=claude-haiku-4-5-20251001" >> "$GITHUB_OUTPUT"
          else
            echo "model=claude-sonnet-5" >> "$GITHUB_OUTPUT"
          fi

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          prompt: |
            あなたは vscode-mindmap-editor（VS Code 拡張機能）の開発エージェントです。

            以下の Issue を実装・修正してください。

            Issue #${{ matrix.issue.number }}: ${{ matrix.issue.title }}

            Issue 本文:
            ${{ matrix.issue.body }}

            ## 作業手順

            1. リポジトリのコードを読んで現状を把握する
            2. Issue の要求を実装・修正する
               - ソースコードは `src/` 以下（TypeScript）
               - WebView 用スクリプトは `media/mindmap.js`
               - エントリポイントは `src/extension.ts`
            3. コミット前に `package.json` の `version` を確認し、必要に応じて更新する
               - 判定基準は `docs/ai/release-policy.md` の「バージョンポリシー」に従う
                 - 要件変更あり（`docs/requirements-usdm.md` の仕様内容に変更が生じる修正） → マイナーアップ
                 - コード修正のみ（バグ修正・リファクタ等、要件変更を伴わない） → パッチアップ
               - 要件変更を行った場合は `docs/requirements-usdm.md` 冒頭の「バージョン」「最終更新」欄と `package.json` の `version` を同じ値に揃える
               - Marketplace は同一バージョンの再公開ができないため、変更内容が些少でも必ずいずれかのアップを行う
            4. `${{ steps.jira.outputs.branch_name }}` ブランチを作成して変更をコミットする
               - 指定されたブランチ名を変更しないこと
               - コミットメッセージは日本語で簡潔にする
               - Issue本文にJira課題キーがある場合は、すべてのコミットメッセージの先頭にJira課題キーを含める
               - コミットメッセージ例: `${{ steps.jira.outputs.commit_example }}`
            5. main ブランチへの draft PR を作成する
               - PR タイトル: `${{ steps.jira.outputs.pr_title }}`
               - 指定されたPRタイトルを変更しないこと
               - PR 本文に変更内容のサマリーと `Closes #${{ matrix.issue.number }}` を含める

            ## 注意事項

            - `CLAUDE.md` はコード構成・規約の参照用として読み、エージェント定義（`.claude/agents/`）に従って実装すること
            - `dist/` は編集しない（ビルド出力のため）
            - コメントは WHY が非自明な場合のみ書く
            - バージョンポリシーの詳細は `docs/ai/release-policy.md` を参照する
          claude_args: |
            --max-turns 100
            --model ${{ steps.model.outputs.model }}
            --dangerously-skip-permissions

      - name: Ensure PR exists
        id: ensure_pr
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          NUM: ${{ matrix.issue.number }}
          BR: ${{ steps.jira.outputs.branch_name }}
          PR_TITLE: ${{ steps.jira.outputs.pr_title }}
        run: |
          set -euo pipefail
          # エージェントがブランチを作れていなければ実装未達としてスキップ
          if ! gh api "repos/${REPO}/branches/${BR}" >/dev/null 2>&1; then
            echo "branch ${BR} not found; skip PR creation"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # 既にPRがあれば何もしない（エージェントが手順5まで完走したケース。冪等）
          if [ "$(gh pr list --repo "${REPO}" --head "${BR}" --state open --json number --jq 'length')" -gt 0 ]; then
            echo "PR already exists for ${BR}"
            echo "created=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # main と差分が無ければ作らない
          ahead=$(gh api "repos/${REPO}/compare/main...${BR}" --jq '.ahead_by')
          if [ "${ahead}" -eq 0 ]; then
            echo "no commits ahead of main; skip PR creation"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # エージェントが手順5(PR作成)を取りこぼした場合の保険として draft PR を作成する
          gh api "repos/${REPO}/pulls" \
            -f title="${PR_TITLE}" \
            -f head="${BR}" \
            -f base="main" \
            -f body="$(printf 'Issue #%s の自動実装。\n\nCloses #%s' "${NUM}" "${NUM}")" \
            -F draft=true
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Remove ai-task label
        if: steps.ensure_pr.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ matrix.issue.number }} --repo ${{ github.repository }} \
            --remove-label ai-task
