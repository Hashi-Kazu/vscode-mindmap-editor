name: AI Coder

on:
 issues:
   types: [labeled]

permissions:
 contents: write
 pull-requests: write
 issues: write
 id-token: write

jobs:
 ai-code:
   if: github.event.label.name == 'ai-task'
   runs-on: ubuntu-latest

   steps:
     - uses: anthropics/claude-code-action@v1
       with:
         claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
         github_token: ${{ secrets.GITHUB_TOKEN }}
         show_full_output: true
         prompt: |
           あなたは vscode-mindmap-editor（VS Code 拡張機能）の開発エージェントです。

           以下の Issue を実装・修正してください。

           Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

           Issue 本文:
           ${{ github.event.issue.body }}

           ## 作業手順

           1. リポジトリのコードを読んで現状を把握する
           2. Issue の要求を実装・修正する
              - ソースコードは `src/` 以下（TypeScript）
              - WebView 用スクリプトは `media/mindmap.js`
              - エントリポイントは `src/extension.ts`
           3. コミット前に `package.json` の `version` を確認し、必要に応じて更新する
              - 判定基準は `docs/ai/release-policy.md` の「バージョンポリシー」に従う
                - 要件変更あり（`docs/requirements-usdm.md` の仕様内容に変更が生じる修正） → マイナーアップ
                - コード修正のみ（バグ修正・リファクタ等、要件変更を伴わない） → パッチアップ
              - 要件変更を行った場合は `docs/requirements-usdm.md` 冒頭の「バージョン」「最終更新」欄と `package.json` の `version` を同じ値に揃える
              - Marketplace は同一バージョンの再公開ができないため、変更内容が些少でも必ずいずれかのアップを行う
           4. `feature/issue-${{ github.event.issue.number }}` ブランチを作成して変更をコミットする
              - コミットメッセージは日本語で簡潔に（例: `feat: ○○機能を追加 (#${{ github.event.issue.number }})`）
           5. main ブランチへの draft PR を作成する
              - PR タイトル: `feat: ${{ github.event.issue.title }}`
              - PR 本文に変更内容のサマリーと `Closes #${{ github.event.issue.number }}` を含める

           ## 注意事項

           - `CLAUDE.md` はコード構成・規約の参照用として読み、エージェント定義（`.claude/agents/`）に従って実装すること
           - `dist/` は編集しない（ビルド出力のため）
           - コメントは WHY が非自明な場合のみ書く
           - バージョンポリシーの詳細は `docs/ai/release-policy.md` を参照する
         claude_args: |
           --max-turns 100
           --dangerously-skip-permissions
