name: Jira Sync

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  create-jira-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Determine Jira issue type
        id: type
        env:
          LABELS_JSON: ${{ toJson(github.event.issue.labels.*.name) }}
        run: |
          labels=$(echo "$LABELS_JSON" | jq -r '.[]' | tr '[:upper:]' '[:lower:]')
          issuetype_id=10012
          if grep -qx 'bug' <<< "$labels"; then
            issuetype_id=10014
          elif grep -qx 'enhancement' <<< "$labels"; then
            issuetype_id=10013
          fi
          echo "issuetype_id=$issuetype_id" >> "$GITHUB_OUTPUT"

      - name: Create Jira issue
        id: create
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_EPIC_KEY: HSKZ-25
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUETYPE_ID: ${{ steps.type.outputs.issuetype_id }}
        run: |
          auth=$(printf '%s:%s' "$JIRA_EMAIL" "$JIRA_API_TOKEN" | base64 -w0)
          summary="#${ISSUE_NUMBER} ${ISSUE_TITLE}"
          payload=$(jq -n \
            --arg summary "$summary" \
            --arg body "${ISSUE_BODY:-}" \
            --arg url "$ISSUE_URL" \
            --arg issuetype "$ISSUETYPE_ID" \
            --arg epic "$JIRA_EPIC_KEY" \
            '
            def para(t): {type: "paragraph", content: [{type: "text", text: t}]};
            {
              fields: {
                project: {key: "HSKZ"},
                summary: $summary,
                issuetype: {id: $issuetype},
                parent: {key: $epic},
                description: {
                  type: "doc",
                  version: 1,
                  content: ((if $body == "" then [] else [para($body)] end) + [para("GitHub Issue: " + $url)])
                }
              }
            }
            ')
          response=$(curl -sS --fail-with-body -X POST \
            -H "Authorization: Basic ${auth}" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "https://hashi-kazu.atlassian.net/rest/api/3/issue")
          key=$(echo "$response" | jq -r '.key')
          echo "jira_key=$key" >> "$GITHUB_OUTPUT"

      - name: Comment on GitHub issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} \
            --body "🔗 Jira課題を作成しました: ${{ steps.create.outputs.jira_key }} https://hashi-kazu.atlassian.net/browse/${{ steps.create.outputs.jira_key }}"
