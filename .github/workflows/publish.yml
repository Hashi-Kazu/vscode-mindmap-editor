name: Publish to VS Code Marketplace

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'media/**'
      - 'package.json'
      - 'README.md'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Check if version already published
        id: version_check
        run: |
          local_version=$(node -p "require('./package.json').version")
          publisher=$(node -p "require('./package.json').publisher")
          name=$(node -p "require('./package.json').name")
          published_version=$(npx @vscode/vsce show "$publisher.$name" --json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).versions[0].version" 2>/dev/null || echo "")
          echo "local version: $local_version / published version: $published_version"
          if [ "$local_version" = "$published_version" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Marketplace
        if: steps.version_check.outputs.should_publish == 'true'
        run: npx @vscode/vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
