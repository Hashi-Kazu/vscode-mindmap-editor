<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Root node -->
  <circle cx="2.5" cy="8" r="2" fill="#c5c5c5"/>

  <!-- Branch lines: root → L1 (bezier curves for organic feel) -->
  <path d="M4.5 8 C5.8 8 5.2 3.5 6.3 3.5"
        stroke="#c5c5c5" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <line x1="4.5" y1="8" x2="6.3" y2="8"
        stroke="#c5c5c5" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M4.5 8 C5.8 8 5.2 12.5 6.3 12.5"
        stroke="#c5c5c5" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- L1 nodes -->
  <circle cx="8" cy="3.5" r="1.7" fill="#c5c5c5"/>
  <circle cx="8" cy="8"   r="1.7" fill="#c5c5c5"/>
  <circle cx="8" cy="12.5" r="1.7" fill="#c5c5c5"/>

  <!-- Branch lines: L1-top → L2 -->
  <line x1="9.7" y1="3.5" x2="11.6" y2="1.8"
        stroke="#c5c5c5" stroke-width="1" stroke-linecap="round"/>
  <line x1="9.7" y1="3.5" x2="11.6" y2="5.2"
        stroke="#c5c5c5" stroke-width="1" stroke-linecap="round"/>

  <!-- L2 nodes -->
  <circle cx="13" cy="1.8" r="1.4" fill="#c5c5c5"/>
  <circle cx="13" cy="5.2" r="1.4" fill="#c5c5c5"/>
</svg>
